<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | ExpensePilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 900: '#064e3b' },
                        surface: '#ffffff', background: '#f8fafc',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background font-sans text-zinc-800 antialiased min-h-screen flex flex-col">

    <nav class="w-full h-20 bg-surface/80 backdrop-blur-xl border-b border-zinc-200/50 fixed top-0 z-50 flex items-center justify-between px-6 lg:px-12">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-brand-500 to-brand-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-500/30">
                <i class="fas fa-wallet text-lg"></i>
            </div>
            <span class="text-xl font-extrabold tracking-tight text-zinc-900">ExpensePilot</span>
        </div>
        <div>
            <a href="login.html" class="text-sm font-bold text-zinc-500 hover:text-zinc-900 transition">Back to <span class="text-brand-600">Log In</span></a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6 mt-20">
        <div class="w-full max-w-md bg-surface rounded-3xl border border-zinc-200 shadow-2xl shadow-zinc-200/50 p-8 sm:p-10 relative overflow-hidden">
            
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-brand-50 rounded-full blur-3xl opacity-60 pointer-events-none"></div>

            <div class="text-center mb-8 relative z-10">
                <div class="w-14 h-14 bg-brand-50 border border-brand-100 rounded-2xl flex items-center justify-center text-brand-600 mx-auto mb-5 shadow-sm">
                    <i class="fas fa-key text-xl"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-zinc-900 tracking-tight mb-2">Reset Password</h1>
                <p class="text-sm text-zinc-500 font-medium">Enter your registered email address and we'll send you a secure link to reset your password.</p>
            </div>

            <form id="resetForm" class="space-y-5 relative z-10">
                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-1.5">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 text-zinc-900 transition font-medium" placeholder="you@example.com">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-zinc-900 text-white font-bold py-3.5 rounded-xl hover:bg-zinc-800 transition shadow-lg shadow-zinc-900/20 flex items-center justify-center gap-2 mt-2">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-8 text-center relative z-10" id="successMessage" style="display: none;">
                <p class="text-sm font-bold text-brand-600 bg-brand-50 p-4 rounded-xl border border-brand-100">
                    <i class="fas fa-check-circle mr-1"></i> If an account exists, a reset link has been sent. Check your inbox!
                </p>
            </div>
        </div>
    </main>

    <script type="module" src="./js/forgot-password.js"></script>
</body>
</html>
