<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ExpensePilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#10b981', 600: '#059669' },
                        background: '#f8fafc',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background font-sans flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-xl shadow-zinc-200/40 border border-zinc-100 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-gradient-to-br from-brand-500 to-brand-600 rounded-xl flex items-center justify-center text-white mx-auto mb-4 shadow-lg shadow-brand-500/30">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>
            </div>
            <h1 class="text-2xl font-extrabold text-zinc-900 tracking-tight">Create your account</h1>
            <p class="text-zinc-500 font-medium mt-2">Start tracking your finances today.</p>
        </div>

        <p id="error-msg" class="hidden bg-red-50 text-red-600 text-sm font-medium p-3 rounded-xl mb-6 border border-red-100 text-center"></p>

        <form id="signup-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-zinc-700 mb-1.5">Full Name</label>
                <input type="text" id="fullname" required class="w-full p-3.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:outline-none transition font-medium text-zinc-900" placeholder="John Doe">
            </div>
            <div>
                <label class="block text-sm font-semibold text-zinc-700 mb-1.5">Email Address</label>
                <input type="email" id="email" required class="w-full p-3.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:outline-none transition font-medium text-zinc-900" placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-sm font-semibold text-zinc-700 mb-1.5">Password</label>
                <input type="password" id="password" required minlength="6" class="w-full p-3.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:outline-none transition font-medium text-zinc-900" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-brand-600 text-white font-bold py-3.5 rounded-xl hover:bg-brand-500 transition-colors shadow-lg shadow-brand-500/30 mt-2">Sign Up</button>
        </form>

        <p class="text-center text-sm font-medium text-zinc-500 mt-8">
            Already have an account? <a href="login.html" class="text-brand-600 font-bold hover:text-brand-700 transition">Log in</a>
        </p>
    </div>

    <script type="module">
        import { checkAuthStatus } from './js/auth.js';
        checkAuthStatus(false); 
    </script>
</body>
</html>
