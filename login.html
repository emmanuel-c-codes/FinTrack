<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | ExpensePilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 900: '#064e3b' },
                        surface: '#ffffff', background: '#f8fafc',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background font-sans text-zinc-800 antialiased min-h-screen flex flex-col">

    <!-- Top Navigation Bar -->
    <nav class="w-full h-20 bg-surface/80 backdrop-blur-xl border-b border-zinc-200/50 fixed top-0 z-50 flex items-center justify-between px-6 lg:px-12">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-brand-500 to-brand-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-500/30">
                <i class="fas fa-wallet text-lg"></i>
            </div>
            <span class="text-xl font-extrabold tracking-tight text-zinc-900">ExpensePilot</span>
        </div>
        <div class="flex items-center gap-3 md:gap-6 text-xs md:text-sm font-medium text-gray-600">
            <a href="index.html" class="text-emerald-600 transition">Home</a>
            <a href="login.html" class="text-emerald-600 transition">Login</a>
            <a href="signup.html" class="bg-emerald-600 text-white px-3 md:px-4 py-2 rounded-lg hover:bg-emerald-700 transition">Sign Up</a>
        </div>
        <!-- <div>
            <a href="signup.html" class="text-sm font-bold text-zinc-500 hover:text-zinc-900 transition">Don't have an account? <span class="text-brand-600">Sign Up</span></a>
        </div> -->
    </nav>

    <!-- Main Auth Container -->
    <main class="flex-1 flex items-center justify-center p-6 mt-20">
        <div class="w-full max-w-md bg-surface rounded-3xl border border-zinc-200 shadow-2xl shadow-zinc-200/50 p-8 sm:p-10">
            
            <div class="text-center mb-8">
                <h1 class="text-2xl font-extrabold text-zinc-900 tracking-tight mb-2">Welcome back</h1>
                <p class="text-sm text-zinc-500 font-medium">Enter your details to access your dashboard.</p>
            </div>

            <!-- Google Sign In -->
            <button id="googleAuthBtn" type="button" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-zinc-200 text-zinc-700 font-bold py-3.5 rounded-xl hover:border-zinc-300 hover:bg-zinc-50 transition shadow-sm group">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5 group-hover:scale-110 transition-transform">
                Continue with Google
            </button>

            <div class="relative flex items-center py-6">
                <div class="flex-grow border-t border-zinc-200"></div>
                <span class="flex-shrink-0 mx-4 text-zinc-400 text-xs font-bold uppercase tracking-wider">Or email & password</span>
                <div class="flex-grow border-t border-zinc-200"></div>
            </div>

            <!-- Email Auth Form -->
            <form id="authForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-1.5">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 text-zinc-900 transition font-medium" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-1.5">Password</label>
                    <input type="password" id="password" required class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 text-zinc-900 transition font-medium" placeholder="••••••••">
                </div>
                
                <div class="flex items-center justify-between pt-1 pb-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded text-brand-500 focus:ring-brand-500 w-4 h-4 cursor-pointer">
                        <span class="text-sm font-medium text-zinc-600">Remember me</span>
                    </label>
                    <a href="./forgot-password.html" class="text-sm font-bold text-brand-600 hover:text-brand-700 transition">Forgot password?</a>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-zinc-900 text-white font-bold py-3.5 rounded-xl hover:bg-zinc-800 transition shadow-lg shadow-zinc-900/20 flex items-center justify-center gap-2">
                    Log In
                </button>
                <p class="text-center text-sm text-gray-600 mt-8">Don't have an account? <a href="signup.html" class="text-emerald-600 font-semibold hover:underline">Sign up</a></p>
            </form>
        </div>
    </main>

    <script type="module" src="./js/auth.js"></script>
</body>
</html>
