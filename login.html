<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Expense Pilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900">Welcome Back</h1>
            <p class="text-slate-500 mt-2">Log in to manage your budget.</p>
        </div>

        <p id="error-msg" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4 border border-red-100"></p>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email" id="email" required class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="you@example.com">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium text-slate-700">Password</label>
                    <a href="forgot-password.html" class="text-xs text-blue-600 hover:underline">Forgot password?</a>
                </div>
                <input type="password" id="password" required class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white font-semibold py-3 rounded-lg hover:bg-slate-800 transition">Log In</button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-6">
            Don't have an account? <a href="signup.html" class="text-blue-600 font-medium hover:underline">Sign up</a>
        </p>
    </div>

    <script type="module">
        import { checkAuthStatus } from './js/auth.js';
        checkAuthStatus(false);
    </script>
</body>
</html>
