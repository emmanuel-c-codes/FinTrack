<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses | ExpensePilot</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0',
                            500: '#10b981', 600: '#059669', 900: '#064e3b', 950: '#022c22',
                        },
                        surface: '#ffffff',
                        background: '#f4f4f5',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background font-sans text-zinc-800 antialiased flex h-screen overflow-hidden">

    <aside id="sidebar" class="bg-surface w-64 border-r border-zinc-200 flex flex-col justify-between absolute lg:relative z-40 h-full transition-transform transform -translate-x-full lg:translate-x-0">
        <div>
            <div class="h-20 flex items-center px-8 border-b border-zinc-100">
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white mr-3">
                    <i class="fas fa-wallet text-sm"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-zinc-900">ExpensePilot</span>
            </div>

            <nav class="p-4 space-y-1 mt-4">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-zinc-500 hover:bg-zinc-50 hover:text-zinc-900 rounded-xl font-medium transition-all">
                    <i class="fas fa-border-all w-5"></i> Dashboard
                </a>
                <a href="expenses.html" class="flex items-center gap-3 px-4 py-3 bg-brand-50 text-brand-600 rounded-xl font-semibold transition-all">
                    <i class="fas fa-receipt w-5"></i> Expenses
                </a>
                <a href="income.html" class="flex items-center gap-3 px-4 py-3 text-zinc-500 hover:bg-zinc-50 hover:text-zinc-900 rounded-xl font-medium transition-all">
                    <i class="fas fa-arrow-trend-up w-5"></i> Income
                </a>
                <a href="budget.html" class="flex items-center gap-3 px-4 py-3 text-zinc-500 hover:bg-zinc-50 hover:text-zinc-900 rounded-xl font-medium transition-all">
                    <i class="fas fa-bullseye w-5"></i> Budgets
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-zinc-100">
            <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-zinc-500 hover:bg-zinc-50 hover:text-zinc-900 rounded-xl font-medium transition-all mb-2">
                <i class="fas fa-gear w-5"></i> Settings
            </a>
            <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl font-medium transition-all">
                <i class="fas fa-sign-out-alt w-5"></i> Log Out
            </button>
        </div>
    </aside>

    <div id="sidebarOverlay" class="fixed inset-0 bg-zinc-900/60 z-30 hidden lg:hidden backdrop-blur-sm transition-opacity"></div>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        
        <header class="h-20 bg-surface/80 backdrop-blur-md sticky top-0 z-20 flex items-center justify-between px-6 lg:px-10 shrink-0 border-b border-zinc-200/50">
            <div class="flex items-center gap-4">
                <button id="mobileMenuBtn" class="lg:hidden text-zinc-500 hover:text-zinc-900 transition text-xl">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="text-xl font-bold text-zinc-900">Manage Expenses</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleExpenseModal()" class="bg-brand-600 hover:bg-brand-700 text-white px-5 py-2.5 rounded-xl font-medium transition-all shadow-sm shadow-brand-600/20 flex items-center gap-2">
                    <i class="fas fa-plus"></i> <span class="hidden sm:inline">Add Expense</span>
                </button>
                <div class="w-10 h-10 rounded-full bg-brand-100 border border-brand-200 overflow-hidden hidden sm:block">
                    <!-- Added id="userAvatar" here -->
                    <img id="userAvatar" src="https://api.dicebear.com/7.x/initials/svg?seed=CE&backgroundColor=059669&textColor=ffffff" alt="Avatar" class="w-full h-full object-cover">
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-10 max-w-7xl mx-auto w-full">
            <div class="bg-surface rounded-2xl border border-zinc-200 shadow-sm overflow-hidden flex flex-col h-full max-h-[calc(100vh-140px)]">
                
                <div class="p-6 border-b border-zinc-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shrink-0">
                    <h2 class="font-bold text-lg text-zinc-900">Transaction History</h2>
                    <div class="relative w-full sm:w-64">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-zinc-400"></i>
                        <input type="text" placeholder="Search..." class="w-full pl-10 pr-4 py-2 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500">
                    </div>
                </div>
                
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead>
                            <tr class="bg-zinc-50 text-zinc-500 text-xs font-semibold uppercase tracking-wider border-b border-zinc-200 sticky top-0 z-10">
                                <th class="p-4">Date</th>
                                <th class="p-4">Description</th>
                                <th class="p-4">Category</th>
                                <th class="p-4 text-right">Amount</th>
                                <th class="p-4 text-center">Actions</th>
                            </tr>
                        </thead>
                        <!-- Added id="expenseTableBody" to match your JS expectations -->
                        <tbody id="expenseTableBody" class="text-sm divide-y divide-zinc-100">
                            <tr>
                                <td colspan="5" class="p-8 text-center text-zinc-400">
                                    <i class="fas fa-spinner fa-spin mr-2"></i> Loading data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="expenseModal" class="fixed inset-0 bg-zinc-900/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-surface w-full max-w-md rounded-2xl shadow-xl border border-zinc-200 overflow-hidden transform transition-all">
            
            <div class="p-6 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
                <h3 class="font-bold text-lg text-zinc-900">Record New Expense</h3>
                <button onclick="toggleExpenseModal()" class="text-zinc-400 hover:text-zinc-600 transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="expenseForm" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-zinc-700 mb-1">Amount (₦)</label>
                        <input type="number" id="expAmount" required min="1" step="any" class="w-full border border-zinc-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 text-zinc-900 transition" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-zinc-700 mb-1">Date</label>
                        <input type="date" id="expDate" required class="w-full border border-zinc-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 text-zinc-900 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-1">Description</label>
                    <input type="text" id="expDesc" required class="w-full border border-zinc-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 text-zinc-900 transition" placeholder="What did you pay for?">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-1">Category</label>
                    <select id="expCategory" required class="w-full border border-zinc-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 text-zinc-900 bg-white transition">
                        <option value="Food & Dining">Food & Dining</option>
                        <option value="Transportation">Transportation</option>
                        <option value="Technology & Software">Technology & Software</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Rent & Housing">Rent & Housing</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-1">Receipt Image (Optional)</label>
                    <input type="file" id="expReceipt" accept="image/*" class="w-full text-sm text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-brand-50 file:text-brand-600 hover:file:bg-brand-100 transition cursor-pointer">
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="toggleExpenseModal()" class="flex-1 border border-zinc-200 text-zinc-600 font-semibold py-2.5 rounded-xl hover:bg-zinc-50 transition">Cancel</button>
                    <button type="submit" id="saveExpenseBtn" class="flex-1 bg-brand-600 text-white font-semibold py-2.5 rounded-xl hover:bg-brand-700 transition">Save Expense</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const expenseModal = document.getElementById('expenseModal');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            sidebarOverlay.classList.toggle('hidden');
        }

        window.toggleExpenseModal = function() {
            expenseModal.classList.toggle('hidden');
        }

        mobileMenuBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);
        
        document.getElementById('expDate').valueAsDate = new Date();
    </script>

    <script type="module" src="./js/expense.js"></script>

</body>
</html>
