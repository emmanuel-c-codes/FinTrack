<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade to Pro | ExpensePilot</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://js.paystack.co/v1/inline.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 900: '#064e3b' },
                        surface: '#ffffff', background: '#f8fafc',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background font-sans text-zinc-800 antialiased flex h-screen overflow-hidden">

    <aside class="bg-surface w-64 border-r border-zinc-100 hidden lg:flex flex-col h-full shadow-sm z-40 relative">
        <div class="h-24 flex items-center px-8 border-b border-zinc-100/50">
            <div class="w-10 h-10 bg-gradient-to-br from-brand-500 to-brand-600 rounded-xl flex items-center justify-center text-white mr-4 shadow-lg shadow-brand-500/30">
                <i class="fas fa-wallet text-lg"></i>
            </div>
            <span class="text-xl font-extrabold tracking-tight text-zinc-900">ExpensePilot</span>
        </div>
        <nav class="p-4 space-y-2 mt-4 flex-1">
            <a href="dashboard.html" class="flex items-center gap-4 px-4 py-3.5 text-zinc-500 hover:bg-zinc-50 hover:text-zinc-900 rounded-2xl font-bold transition-all">
                <i class="fas fa-arrow-left w-5 text-lg"></i> Back to Dashboard
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto relative">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-brand-400/10 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
        
        <header class="h-24 flex items-center px-6 lg:px-10 shrink-0 lg:hidden">
            <a href="dashboard.html" class="text-zinc-500 font-bold hover:text-zinc-900 transition flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </header>

        <div class="flex-1 flex items-center justify-center p-6 pb-20">
            <div class="max-w-md w-full bg-zinc-900 rounded-3xl p-8 lg:p-10 border border-zinc-800 shadow-2xl shadow-brand-900/20 relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-brand-500 text-white text-xs font-bold px-4 py-1.5 rounded-bl-xl uppercase tracking-wider">Pro Tier</div>
                
                <h2 class="text-3xl font-extrabold text-white mb-2 mt-4">Unlock Everything</h2>
                <p class="text-zinc-400 font-medium text-sm mb-8">Take absolute control of your financial future.</p>
                
                <div class="mb-8 bg-zinc-800/50 p-6 rounded-2xl border border-zinc-700/50 text-center">
                    <span class="text-5xl font-extrabold text-white">₦1,500</span>
                    <span class="text-zinc-400 font-medium">/month</span>
                </div>
                
                <ul class="space-y-4 mb-10">
                    <li class="flex items-center gap-3 text-sm font-semibold text-white">
                        <i class="fas fa-check-circle text-brand-400 text-xl"></i> Unlimited Budgets
                    </li>
                    <li class="flex items-center gap-3 text-sm font-semibold text-white">
                        <i class="fas fa-check-circle text-brand-400 text-xl"></i> Receipt Image Vault
                    </li>
                    <li class="flex items-center gap-3 text-sm font-semibold text-white">
                        <i class="fas fa-check-circle text-brand-400 text-xl"></i> Export to Excel / CSV
                    </li>
                </ul>
                
                <button id="paystackBtn" class="w-full bg-brand-500 text-white font-extrabold py-4 rounded-xl hover:bg-brand-400 transition text-center shadow-lg shadow-brand-500/20 text-lg flex items-center justify-center gap-3 mb-4">
                    <i class="fas fa-lock text-sm"></i> Pay Securely with Paystack
                </button>

                <button id="devTestBtn" class="w-full bg-zinc-800 text-zinc-300 font-bold py-3 rounded-xl hover:bg-zinc-700 transition text-sm flex items-center justify-center gap-2 border border-zinc-700 border-dashed">
                    <i class="fas fa-code"></i> Developer: Force Upgrade to Pro
                </button>
            </div>
        </div>
    </main>

    <script type="module" src="./js/upgrade.js"></script>
</body>
</html>
